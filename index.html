    <!-- ── STRUCTURED DATA — FAQPage (targets featured snippets) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much did the NEF disburse in South Africa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The National Empowerment Fund (NEF) disbursed R3.596 billion across 392 funded companies, supporting 31,654 jobs at an average cost of R113,616 per job, according to Parliamentary Question 705 (PQ705) data from dtic.gov.za."
          }
        },
        {
          "@type": "Question",
          "name": "How much did the IDC disburse in 2024/25?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "According to the IDC's audited Annual Financial Statements 2024/25, the IDC disbursed R16.3 billion on-balance-sheet and approved R13.4 billion in new funding. The IDC also cites a cumulative transformation commitment figure of R26.6 billion, which is a multi-year figure. The IDC supported 15,732 full-time equivalent jobs created and/or saved."
          }
        },
        {
          "@type": "Question",
          "name": "What is the cost per job for the IDC vs the NEF?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Using audited figures, the IDC's cost per job in 2024/25 was approximately R1,036,000 (R16.3B disbursed ÷ 15,732 FTE jobs). The NEF's cumulative cost per job was R113,616. This represents a roughly 9× efficiency gap in favour of the NEF."
          }
        },
        {
          "@type": "Question",
          "name": "Which South African province received the most NEF funding?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gauteng received the most NEF funding with R1.04 billion across 135 deals, supporting 14,138 jobs. KwaZulu-Natal was second with R970 million across 122 deals supporting 8,440 jobs. Together these two provinces account for 55.9% of all NEF disbursements."
          }
        },
        {
          "@type": "Question",
          "name": "Where can I find NEF PQ705 data?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The NEF funding data is sourced from Parliamentary Question 705 (PQ705) submitted by Mr RWC Chance (DA), available via dtic.gov.za. FundingStatsZA provides a free interactive dashboard of all 392 funded companies at fundingstatssa.online."
          }
        }
      ]
    }
    </script>
